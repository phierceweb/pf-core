# Builds and publishes the package to PyPI when a release tag (v*) is pushed —
# tags are the public consumption surface; main carries no stability promise.
#
# The `build` job builds the sdist/wheel and runs twine check; the `publish`
# job uploads to PyPI via OIDC Trusted Publishing — the trusted publisher is
# registered on pypi.org (project "pf-core" → GitHub publisher: owner
# phierceweb, repo pf-core, workflow publish.yml, environment pypi), so no
# API-token secret lives in the repo.
name: publish
on:
  push:
    tags: ["v*"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build twine
      # Fail fast when the pushed tag doesn't match pyproject's version —
      # a mismatched build otherwise reaches PyPI and 400s on filename reuse.
      - name: verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION != pyproject version $PKG_VERSION — bump pyproject (and CHANGELOG) before tagging"
            exit 1
          fi
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
